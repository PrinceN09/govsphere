# =============================================================================
# GovSphere — Docker Compose (Production)
# =============================================================================
# Services:
#   - PostgreSQL    — primary database
#   - Redis         — cache + queue broker
#   - MinIO         — S3-compatible object storage
#   - API           — NestJS backend (port 4000)
#   - Web           — Next.js frontend (port 3000)
#   - Nginx         — reverse proxy (ports 80/443) [optional]
#
# Usage:
#   Build images first:
#     docker build -f apps/api/Dockerfile -t govsphere-api:latest .
#     docker build -f apps/web/Dockerfile -t govsphere-web:latest .
#
#   Start:
#     docker compose -f docker-compose.prod.yml up -d
#
#   Run migrations before first start:
#     docker compose -f docker-compose.prod.yml run --rm api \
#       npx prisma migrate deploy --schema packages/database/prisma/schema.prisma
#
# IMPORTANT: All secrets must be provided via an .env.prod file or
# Docker secrets — never commit production credentials to this file.

name: govsphere-prod

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: govsphere_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-govsphere_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-govsphere} -d ${POSTGRES_DB:-govsphere_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - govsphere_network
    # Do NOT expose port 5432 externally in production

  # ---------------------------------------------------------------------------
  # Redis — Cache + Bull queue broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: govsphere_redis_prod
    restart: always
    command: >
      redis-server
      --save 60 1000
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - govsphere_network
    # Do NOT expose port 6379 externally in production

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: govsphere_minio_prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - govsphere_network
    # Do NOT expose MinIO S3 or console port externally — proxy through API

  # ---------------------------------------------------------------------------
  # GovSphere API — NestJS backend
  # ---------------------------------------------------------------------------
  api:
    image: govsphere-api:latest
    container_name: govsphere_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: ${APP_URL:?APP_URL required}
      API_URL: ${API_URL:?API_URL required}

      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-govsphere_db}

      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      BULLMQ_REDIS_DB: "1"

      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:?MFA_ENCRYPTION_KEY required}

      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}

      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-GovSphere}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@govsphere.gouv.cd}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-365}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - govsphere_network
    ports:
      - "4000:4000" # Remove this and proxy via nginx in production

  # ---------------------------------------------------------------------------
  # GovSphere Web — Next.js frontend
  # ---------------------------------------------------------------------------
  web:
    image: govsphere-web:latest
    container_name: govsphere_web_prod
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXTAUTH_URL: ${APP_URL:?APP_URL required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      NEXT_PUBLIC_API_URL: ${API_URL:?API_URL required}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - govsphere_network
    ports:
      - "3000:3000" # Remove this and proxy via nginx in production

# =============================================================================
# Networks
# =============================================================================
networks:
  govsphere_network:
    name: govsphere_prod_network
    driver: bridge

# =============================================================================
# Volumes (named volumes survive container restarts and redeployments)
# =============================================================================
volumes:
  postgres_data:
    name: govsphere_postgres_prod_data
  redis_data:
    name: govsphere_redis_prod_data
  minio_data:
    name: govsphere_minio_prod_data
